[pytest]
# Without this, `pytest` invoked directly (as opposed to `python -m pytest`)
# does not add the current directory to sys.path, so `from app... import ...`
# fails with ModuleNotFoundError inside Docker (where the entrypoint is the
# bare `pytest` executable). `pythonpath = .` fixes this regardless of how
# pytest is invoked.
pythonpath = .
testpaths = tests

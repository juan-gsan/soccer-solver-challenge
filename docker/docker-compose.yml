services:
  backend:
    build:
      context: ../backend
      dockerfile: Dockerfile
    container_name: soccersolver-backend
    ports:
      - "${BACKEND_PORT:-8000}:8000"
    volumes:
      - ../backend:/app
    env_file:
      - ../.env
    networks:
      - soccersolver

  frontend:
    build:
      context: ../frontend
      dockerfile: Dockerfile
    container_name: soccersolver-frontend
    ports:
      - "5173:5173"
    volumes:
      - ../frontend:/app
      - /app/node_modules
    depends_on:
      - backend
    env_file:
      - ../.env
    networks:
      - soccersolver

networks:
  soccersolver:
    driver: bridge
